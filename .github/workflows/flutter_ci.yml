name: SheikhGo Driver — CI

on:
  push:
    paths:
      - 'Frontend/sheikh-driver/**'
      - '.github/workflows/flutter_ci.yml'
  pull_request:
    paths:
      - 'Frontend/sheikh-driver/**'

jobs:
  analyze-test-build:
    name: Analyze · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/sheikh-driver

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-warnings

      - name: Unit & widget tests
        run: flutter test --coverage

      - name: Build debug APK
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=http://placeholder.api.local/api \
            --dart-define=TENANT_SLUG=ci \
            --dart-define=ENV=dev

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: Frontend/sheikh-driver/coverage/lcov.info
