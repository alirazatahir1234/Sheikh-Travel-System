<div class="page-header">
  <h2>Record Payment</h2>
  <button mat-button routerLink="/payments"><mat-icon>arrow_back</mat-icon> Back</button>
</div>

<mat-card class="form-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <div class="stb-field">
          <label for="payment-bookingId">Booking ID</label>
          <input id="payment-bookingId" class="stb-input" type="number" formControlName="bookingId" />
          <span class="stb-error" *ngIf="form.get('bookingId')?.hasError('required') && form.get('bookingId')?.touched">Required</span>
        </div>

        <div class="stb-field">
          <label for="payment-amount">Amount (PKR)</label>
          <input id="payment-amount" class="stb-input" type="number" formControlName="amount" min="1" />
          <span class="stb-error" *ngIf="form.get('amount')?.hasError('required') && form.get('amount')?.touched">Required</span>
        </div>

        <div class="stb-field">
          <label for="payment-method">Payment Method</label>
          <select id="payment-method" class="stb-select" formControlName="paymentMethod">
            <option *ngFor="let m of methods" [ngValue]="m">{{ m }}</option>
          </select>
        </div>

        <div class="stb-field">
          <label for="payment-reference">Reference Number (optional)</label>
          <input id="payment-reference" class="stb-input" type="text" formControlName="transactionReference" />
        </div>
      </div>

      <div class="actions">
        <button mat-button type="button" routerLink="/payments">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          Record Payment
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
