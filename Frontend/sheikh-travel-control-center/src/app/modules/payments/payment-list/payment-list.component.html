<div class="payments-page">
  <div class="page-header">
    <h2>Payments</h2>
    <div class="header-actions">
      <button mat-stroked-button class="action-btn" (click)="exportCsv()">
        <mat-icon>download</mat-icon>
        <span class="btn-label">Export CSV</span>
      </button>
      <button mat-raised-button color="primary" class="action-btn action-btn--primary" routerLink="/payments/new">
        <mat-icon>add</mat-icon>
        <span class="btn-label">Record Payment</span>
      </button>
    </div>
  </div>

  <mat-card class="filter-card">
    <mat-card-content>
      <form [formGroup]="filterForm" class="filter-grid" (ngSubmit)="applyFilter()">
        <div class="stb-field stb-field--filter">
          <label for="payment-booking-id">Booking ID</label>
          <input id="payment-booking-id" class="stb-input" type="number"
                 formControlName="bookingId" min="1" placeholder="e.g. 42" />
        </div>

        <div class="stb-field stb-field--filter">
          <label for="payment-status-filter">Status</label>
          <select id="payment-status-filter" class="stb-select" formControlName="status">
            <option *ngFor="let s of statusOptions" [ngValue]="s.value">{{ s.label }}</option>
          </select>
        </div>

        <div class="stb-field stb-field--filter">
          <label for="payment-date-from">From Date</label>
          <input id="payment-date-from" class="stb-input" type="date" formControlName="dateFrom" />
        </div>

        <div class="stb-field stb-field--filter">
          <label for="payment-date-to">To Date</label>
          <input id="payment-date-to" class="stb-input" type="date" formControlName="dateTo" />
        </div>

        <div class="filter-actions">
          <button mat-raised-button color="primary" type="submit">
            <mat-icon>search</mat-icon>
            <span class="btn-label">Filter</span>
          </button>
          <button mat-button type="button" (click)="clearFilter()">Clear</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="payments-card">
    <mat-card-content>
      <div *ngIf="loading" class="loading"><mat-spinner diameter="36"></mat-spinner></div>
      <div *ngIf="error" class="error-message"><mat-icon>error</mat-icon> {{ error }}</div>

      <div class="table-wrap" *ngIf="!loading && !error">
        <table mat-table [dataSource]="dataSource" class="full-width responsive-table">
          <ng-container matColumnDef="bookingId">
            <th mat-header-cell *matHeaderCellDef>Booking</th>
            <td mat-cell *matCellDef="let p" class="mobile-card-header" [attr.data-label]="'Booking'">
              <span class="mobile-booking-id">#{{ p.bookingId }}</span>
            </td>
          </ng-container>
          <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef>Amount</th>
            <td mat-cell *matCellDef="let p" [attr.data-label]="'Amount'">PKR {{ p.amount | number }}</td>
          </ng-container>
          <ng-container matColumnDef="paymentMethod">
            <th mat-header-cell *matHeaderCellDef>Method</th>
            <td mat-cell *matCellDef="let p" [attr.data-label]="'Method'">{{ p.paymentMethod }}</td>
          </ng-container>
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let p" [attr.data-label]="'Status'">
              <span class="status-badge"
                [style.background]="getStatusColor(p.status) + '20'"
                [style.color]="getStatusColor(p.status)">{{ p.status }}</span>
            </td>
          </ng-container>
          <ng-container matColumnDef="paymentDate">
            <th mat-header-cell *matHeaderCellDef>Paid At</th>
            <td mat-cell *matCellDef="let p" [attr.data-label]="'Paid At'">{{ p.paymentDate | date:'mediumDate' }}</td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let p" class="actions-cell" [attr.data-label]="'Actions'">
              <button mat-icon-button matTooltip="Print Receipt" (click)="viewReceipt(p.id)" color="primary">
                <mat-icon>receipt</mat-icon>
              </button>
              <button mat-icon-button matTooltip="Refund" color="warn"
                *ngIf="canRefund(p)" (click)="refund(p)">
                <mat-icon>undo</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <p *ngIf="!loading && !error && dataSource.data.length === 0" class="no-data">
        No payments match the current filter.
      </p>

      <div class="paginator-wrap">
        <mat-paginator [length]="totalCount" [pageSizeOptions]="[10,25,50]"
          (page)="load($event.pageIndex + 1, $event.pageSize)">
        </mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
