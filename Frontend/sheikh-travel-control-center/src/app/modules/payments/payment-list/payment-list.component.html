<div class="page-header">
  <h2>Payments</h2>
  <div class="header-actions">
    <button mat-stroked-button (click)="exportCsv()">
      <mat-icon>download</mat-icon> Export CSV
    </button>
    <button mat-raised-button color="primary" routerLink="/payments/new">
      <mat-icon>add</mat-icon> Record Payment
    </button>
  </div>
</div>

<!-- Filter Bar -->
<mat-card class="filter-card">
  <mat-card-content>
    <form [formGroup]="filterForm" class="filter-grid" (ngSubmit)="applyFilter()">
      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Booking ID</mat-label>
        <input matInput type="number" formControlName="bookingId" min="1" placeholder="e.g. 42">
      </mat-form-field>

      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option *ngFor="let s of statusOptions" [value]="s.value">{{ s.label }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>From Date</mat-label>
        <input matInput [matDatepicker]="fromPicker" formControlName="dateFrom">
        <mat-datepicker-toggle matIconSuffix [for]="fromPicker"></mat-datepicker-toggle>
        <mat-datepicker #fromPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>To Date</mat-label>
        <input matInput [matDatepicker]="toPicker" formControlName="dateTo">
        <mat-datepicker-toggle matIconSuffix [for]="toPicker"></mat-datepicker-toggle>
        <mat-datepicker #toPicker></mat-datepicker>
      </mat-form-field>

      <div class="filter-actions">
        <button mat-raised-button color="primary" type="submit">
          <mat-icon>search</mat-icon> Filter
        </button>
        <button mat-button type="button" (click)="clearFilter()">Clear</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>

<!-- Table -->
<mat-card>
  <mat-card-content>
    <div *ngIf="loading" class="loading"><mat-spinner diameter="36"></mat-spinner></div>
    <div *ngIf="error" class="error-message"><mat-icon>error</mat-icon> {{ error }}</div>

    <table mat-table [dataSource]="dataSource" *ngIf="!loading && !error" class="full-width">
      <ng-container matColumnDef="bookingId">
        <th mat-header-cell *matHeaderCellDef>Booking</th>
        <td mat-cell *matCellDef="let p"><strong>#{{ p.bookingId }}</strong></td>
      </ng-container>
      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef>Amount</th>
        <td mat-cell *matCellDef="let p">PKR {{ p.amount | number }}</td>
      </ng-container>
      <ng-container matColumnDef="paymentMethod">
        <th mat-header-cell *matHeaderCellDef>Method</th>
        <td mat-cell *matCellDef="let p">{{ p.paymentMethod }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let p">
          <span class="status-badge"
            [style.background]="getStatusColor(p.status) + '20'"
            [style.color]="getStatusColor(p.status)">{{ p.status }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="paymentDate">
        <th mat-header-cell *matHeaderCellDef>Paid At</th>
        <td mat-cell *matCellDef="let p">{{ p.paymentDate | date:'mediumDate' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let p">
          <button mat-icon-button matTooltip="Print Receipt" (click)="viewReceipt(p.id)" color="primary">
            <mat-icon>receipt</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Refund" color="warn"
            *ngIf="canRefund(p)" (click)="refund(p)">
            <mat-icon>undo</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <p *ngIf="!loading && !error && dataSource.data.length === 0" class="no-data">
      No payments match the current filter.
    </p>

    <mat-paginator [length]="totalCount" [pageSizeOptions]="[10,25,50]"
      (page)="load($event.pageIndex + 1, $event.pageSize)">
    </mat-paginator>
  </mat-card-content>
</mat-card>
