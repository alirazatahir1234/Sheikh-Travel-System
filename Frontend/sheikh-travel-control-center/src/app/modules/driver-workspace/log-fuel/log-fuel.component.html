<div class="driver-page">
  <header class="driver-header stb-elevated">
    <div>
      <h1>Log fuel</h1>
      <p>Record a fuel purchase for your assigned vehicle</p>
    </div>
  </header>

  <mat-card class="fuel-form-card" *ngIf="!loadingTrips">
    <mat-card-content>
      <p class="hint" *ngIf="!vehicles.length">
        No vehicles from current trips. Complete a trip assignment first, or contact dispatch.
      </p>

      <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="vehicles.length">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Vehicle</mat-label>
          <mat-select formControlName="vehicleId">
            <mat-option *ngFor="let v of vehicles" [value]="v.id">{{ v.label }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Fuel type</mat-label>
          <mat-select formControlName="fuelType">
            <mat-option *ngFor="let t of fuelTypes" [value]="t">{{ t }}</mat-option>
          </mat-select>
        </mat-form-field>

        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>Liters</mat-label>
            <input matInput type="number" formControlName="liters" min="0" step="0.1" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Price / liter (PKR)</mat-label>
            <input matInput type="number" formControlName="pricePerLiter" min="0" step="0.01" />
          </mat-form-field>
        </div>

        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>Odometer (km)</mat-label>
            <input matInput type="number" formControlName="odometerReading" min="0" />
          </mat-form-field>
          <div class="stb-field">
            <label for="log-fuel-date">Date</label>
            <input id="log-fuel-date" class="stb-input" type="date" formControlName="fuelDate" />
          </div>
        </div>

        <mat-form-field appearance="outline" class="full">
          <mat-label>Station (optional)</mat-label>
          <input matInput formControlName="station" />
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="submitting || form.invalid">
          {{ submitting ? 'Saving…' : 'Submit fuel receipt' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>

  <div class="driver-loading" *ngIf="loadingTrips">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
</div>
