<div class="page-header">
  <h2>{{ isEdit ? 'Edit Vehicle' : 'Add Vehicle' }}</h2>
  <button mat-button routerLink="/vehicles"><mat-icon>arrow_back</mat-icon> Back</button>
</div>

<mat-card class="form-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <ui-input label="Vehicle Name" formControlName="name" [required]="true"
                  placeholder="Toyota Coaster"
                  [error]="form.get('name')?.hasError('required') && form.get('name')?.touched ? 'Required' : ''">
        </ui-input>

        <ui-input label="Registration Number" formControlName="registrationNumber" [required]="true"
                  placeholder="KHI-1234"
                  [error]="form.get('registrationNumber')?.hasError('required') && form.get('registrationNumber')?.touched ? 'Required' : ''">
        </ui-input>

        <ui-input label="Vehicle Code" formControlName="vehicleCode" placeholder="V-001"></ui-input>
        <ui-input label="VIN" formControlName="vin"></ui-input>
        <ui-input label="Make" formControlName="make" placeholder="Toyota"></ui-input>
        <ui-input label="Model" formControlName="model" placeholder="High Roof"></ui-input>
        <ui-input label="Year" type="number" formControlName="year" placeholder="2022"></ui-input>
        <ui-input label="Vehicle Type" formControlName="vehicleType" placeholder="Coaster"></ui-input>
        <ui-input label="Color" formControlName="color"></ui-input>

        <ui-input label="Seating Capacity" type="number" formControlName="seatingCapacity" [required]="true"
                  [error]="form.get('seatingCapacity')?.hasError('required') && form.get('seatingCapacity')?.touched ? 'Required' : ''">
        </ui-input>

        <ui-input label="Fuel Average (km/L)" type="number" formControlName="fuelAverage" [required]="true"></ui-input>

        <ui-select label="Fuel Type" formControlName="fuelType" [options]="fuelTypeOptions" [required]="true"
                   [error]="form.get('fuelType')?.hasError('required') && form.get('fuelType')?.touched ? 'Required' : ''">
        </ui-select>

        <ui-input label="Current Mileage (km)" type="number" formControlName="currentMileage"></ui-input>
        <ui-input label="Engine No" formControlName="engineNo"></ui-input>
        <ui-input label="Chassis No" formControlName="chassisNo"></ui-input>
        <div class="stb-field">
          <label for="vehicle-insuranceExpiryDate">Insurance Expiry</label>
          <input id="vehicle-insuranceExpiryDate" class="stb-input" type="date" formControlName="insuranceExpiryDate" />
        </div>
        <div class="stb-field">
          <label for="vehicle-purchaseDate">Purchase Date</label>
          <input id="vehicle-purchaseDate" class="stb-input" type="date" formControlName="purchaseDate" />
        </div>
        <ui-input label="Purchase Price" type="number" formControlName="purchasePrice"></ui-input>
        <ui-input label="Branch ID" type="number" formControlName="branchId"></ui-input>
        <ui-input label="Department ID" type="number" formControlName="departmentId"></ui-input>

        <ui-select *ngIf="isEdit" label="Status" formControlName="status" [options]="statusOptions"></ui-select>
      </div>

      <div class="actions">
        <ui-button variant="ghost" type="button" (clicked)="router.navigate(['/vehicles'])">Cancel</ui-button>
        <ui-button variant="primary" type="submit" [loading]="loading" [disabled]="loading">
          {{ isEdit ? 'Update' : 'Create' }}
        </ui-button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
