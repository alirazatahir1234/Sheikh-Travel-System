<div class="page-header">
  <h2>{{ isEdit ? 'Edit Vehicle' : 'Add Vehicle' }}</h2>
  <button mat-button routerLink="/vehicles"><mat-icon>arrow_back</mat-icon> Back</button>
</div>

<mat-card class="form-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <div class="stb-field">
          <label for="vehicle-name">Vehicle Name</label>
          <input id="vehicle-name" class="stb-input" type="text" formControlName="name" placeholder="Toyota Coaster" />
          <span class="stb-error" *ngIf="form.get('name')?.hasError('required') && form.get('name')?.touched">Required</span>
          <span class="stb-error" *ngIf="form.get('name')?.hasError('maxlength') && form.get('name')?.touched">Max 100 characters</span>
        </div>

        <div class="stb-field">
          <label for="vehicle-registration">Registration Number</label>
          <input id="vehicle-registration" class="stb-input" type="text" formControlName="registrationNumber" placeholder="KHI-1234" />
          <span class="stb-error" *ngIf="form.get('registrationNumber')?.hasError('required') && form.get('registrationNumber')?.touched">Required</span>
        </div>

        <div class="stb-field">
          <label for="vehicle-model">Model</label>
          <input id="vehicle-model" class="stb-input" type="text" formControlName="model" placeholder="High Roof" />
        </div>

        <div class="stb-field">
          <label for="vehicle-year">Year</label>
          <input id="vehicle-year" class="stb-input" type="number" formControlName="year" placeholder="2022" />
        </div>

        <div class="stb-field">
          <label for="vehicle-seating">Seating Capacity</label>
          <input id="vehicle-seating" class="stb-input" type="number" formControlName="seatingCapacity" min="1" />
          <span class="stb-error" *ngIf="form.get('seatingCapacity')?.hasError('required') && form.get('seatingCapacity')?.touched">Required</span>
          <span class="stb-error" *ngIf="form.get('seatingCapacity')?.hasError('min') && form.get('seatingCapacity')?.touched">Must be at least 1</span>
        </div>

        <div class="stb-field">
          <label for="vehicle-fuelAverage">Fuel Average (km/L)</label>
          <input id="vehicle-fuelAverage" class="stb-input" type="number" formControlName="fuelAverage" min="0.1" step="0.1" />
          <span class="stb-error" *ngIf="form.get('fuelAverage')?.hasError('required') && form.get('fuelAverage')?.touched">Required</span>
          <span class="stb-error" *ngIf="form.get('fuelAverage')?.hasError('min') && form.get('fuelAverage')?.touched">Must be greater than 0</span>
        </div>

        <div class="stb-field">
          <label for="vehicle-fuelType">Fuel Type</label>
          <select id="vehicle-fuelType" class="stb-select" formControlName="fuelType">
            <option *ngFor="let ft of fuelTypes" [ngValue]="ft">{{ fuelTypeLabel(ft) }}</option>
          </select>
          <span class="stb-error" *ngIf="form.get('fuelType')?.hasError('required') && form.get('fuelType')?.touched">Required</span>
        </div>

        <div class="stb-field">
          <label for="vehicle-mileage">Current Mileage (km)</label>
          <input id="vehicle-mileage" class="stb-input" type="number" formControlName="currentMileage" min="0" />
        </div>

        <div class="stb-field">
          <label for="vehicle-insuranceExpiryDate">Insurance Expiry</label>
          <input id="vehicle-insuranceExpiryDate" class="stb-input" type="date" formControlName="insuranceExpiryDate" />
        </div>

        <div class="stb-field" *ngIf="isEdit">
          <label for="vehicle-status">Status</label>
          <select id="vehicle-status" class="stb-select" formControlName="status">
            <option *ngFor="let s of vehicleStatuses" [ngValue]="s">{{ statusLabel(s) }}</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button mat-button type="button" routerLink="/vehicles">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          {{ isEdit ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
