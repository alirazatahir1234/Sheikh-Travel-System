<div class="page-header">
  <div>
    <h2>Role & Permission Management</h2>
    <p class="page-sub">Define tenant roles and assign fine-grained permissions.</p>
  </div>
  <button mat-stroked-button (click)="load()"><mat-icon>refresh</mat-icon> Refresh</button>
</div>

<mat-card class="form-card">
  <h3>Create role</h3>
  <div class="inline-form">
    <div class="stb-field">
      <label for="new-role-name">Name</label>
      <input id="new-role-name" class="stb-input" type="text" [(ngModel)]="newName" autocomplete="off" />
    </div>
    <div class="stb-field">
      <label for="new-role-code">Code</label>
      <input id="new-role-code" class="stb-input" type="text" [(ngModel)]="newCode" placeholder="FLEET_MANAGER" autocomplete="off" />
    </div>
    <button mat-raised-button color="primary" type="button" (click)="create()"><mat-icon>add</mat-icon> Create</button>
  </div>
</mat-card>

<div *ngIf="loading" class="loading"><mat-spinner diameter="32"></mat-spinner></div>

<div *ngIf="!loading" class="role-layout">
  <mat-card class="table-card">
    <table mat-table [dataSource]="roles" class="admin-table">
      <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Role</th><td mat-cell *matCellDef="let r"><strong>{{ r.name }}</strong></td></ng-container>
      <ng-container matColumnDef="code"><th mat-header-cell *matHeaderCellDef>Code</th><td mat-cell *matCellDef="let r">{{ r.code }}</td></ng-container>
      <ng-container matColumnDef="perms"><th mat-header-cell *matHeaderCellDef>Permissions</th><td mat-cell *matCellDef="let r">{{ r.permissions.length }}</td></ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r"><button mat-button color="primary" (click)="selectRole(r)">Edit</button></td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="['name','code','perms','actions']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['name','code','perms','actions'];" [class.selected]="selectedRole?.id === row.id"></tr>
    </table>
  </mat-card>

  <mat-card *ngIf="selectedRole" class="perm-card">
    <h3>Permissions — {{ selectedRole.name }}</h3>
    <div class="permission-grid">
      <ng-container *ngFor="let group of permissionsByModule()">
        <div class="permission-module">{{ group.module }}</div>
        <mat-checkbox *ngFor="let p of group.items"
                      [checked]="selectedPermissionCodes.has(p.permissionCode)"
                      (change)="togglePermission(p.permissionCode)">
          {{ p.permissionCode }}
        </mat-checkbox>
      </ng-container>
    </div>
    <div class="perm-actions">
      <button mat-raised-button color="primary" (click)="savePermissions()">Save permissions</button>
    </div>
  </mat-card>
</div>
