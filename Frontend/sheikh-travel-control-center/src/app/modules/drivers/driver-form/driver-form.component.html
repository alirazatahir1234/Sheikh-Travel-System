<div class="page-header">
  <h2>{{ isEdit ? 'Edit Driver' : 'Add Driver' }}</h2>
  <button mat-button routerLink="/drivers"><mat-icon>arrow_back</mat-icon> Back</button>
</div>

<mat-card class="form-card">
  <mat-card-content>
    <div class="panel-loading" *ngIf="loadingDriver">
      <mat-spinner diameter="40"></mat-spinner>
      <span>Loading driver…</span>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()" [class.dimmed]="loadingDriver && isEdit">
      <div class="form-grid">
        <div class="stb-field">
          <label for="driver-fullName">Full Name</label>
          <input id="driver-fullName" class="stb-input" type="text" formControlName="fullName" />
          <span class="stb-error" *ngIf="form.get('fullName')?.hasError('required') && form.get('fullName')?.touched">Required</span>
        </div>

        <div class="stb-field">
          <label for="driver-phone">Phone</label>
          <input id="driver-phone" class="stb-input" type="tel" formControlName="phone" placeholder="+92-300-1234567" />
          <span class="stb-error" *ngIf="form.get('phone')?.hasError('required') && form.get('phone')?.touched">Required</span>
        </div>

        <div class="stb-field">
          <label for="driver-licenseNumber">License Number</label>
          <input id="driver-licenseNumber" class="stb-input" type="text" formControlName="licenseNumber" />
          <span class="stb-error" *ngIf="form.get('licenseNumber')?.hasError('required') && form.get('licenseNumber')?.touched">Required</span>
        </div>

        <div class="stb-field">
          <label for="driver-licenseExpiryDate">License Expiry Date</label>
          <input id="driver-licenseExpiryDate" class="stb-input" type="date" formControlName="licenseExpiryDate" />
          <span class="stb-error" *ngIf="form.get('licenseExpiryDate')?.hasError('required') && form.get('licenseExpiryDate')?.touched">Required</span>
        </div>

        <div class="stb-field">
          <label for="driver-cnic">CNIC (optional)</label>
          <input id="driver-cnic" class="stb-input" type="text" formControlName="cnic" placeholder="XXXXX-XXXXXXX-X" />
        </div>

        <mat-form-field appearance="outline" class="span-2">
          <mat-label>Address (optional)</mat-label>
          <textarea matInput formControlName="address" rows="2"></textarea>
        </mat-form-field>

        <div class="stb-field" *ngIf="isEdit">
          <label for="driver-status">Status</label>
          <select id="driver-status" class="stb-select" formControlName="status">
            <option *ngFor="let s of statuses" [ngValue]="s">{{ statusLabel(s) }}</option>
          </select>
        </div>

        <div class="active-toggle" *ngIf="isEdit">
          <mat-slide-toggle formControlName="isActive" color="primary">Active</mat-slide-toggle>
        </div>
      </div>

      <div class="actions">
        <button mat-button type="button" routerLink="/drivers">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          {{ isEdit ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
