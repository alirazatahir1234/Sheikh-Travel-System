<div class="dash">

  <div *ngIf="error" class="error-message">
    <mat-icon>warning</mat-icon> {{ error }}
  </div>

  <!-- Header -->
  <section class="dash-section dash-header">
    <div class="dash-greeting-wrap">
      <nav class="dash-breadcrumb" aria-label="Breadcrumb">
        <span class="bc-root">Dashboard</span>
        <mat-icon>chevron_right</mat-icon>
        <span class="bc-current">Fleet overview</span>
      </nav>
      <stb-greeting-banner
        class="dash-greeting"
        [compact]="true"
        [userName]="userName"
        [notificationsCount]="(unreadCount$ | async) ?? 0"
        subject="notifications">
      </stb-greeting-banner>
      <div class="ops-status" aria-live="polite">
        <span class="ops-status-dot"></span>
        <span>System operational</span>
      </div>
    </div>

    <stb-quick-launch-grid
      class="dash-quick"
      [actionCards]="true"
      title="Quick actions"
      [apps]="quickApps">
    </stb-quick-launch-grid>
  </section>

  <!-- KPIs -->
  <section class="dash-section stats-row">
    <stb-stat-tile
      *ngFor="let s of stats"
      [label]="s.label"
      [value]="s.value"
      [hint]="s.hint"
      [icon]="s.icon"
      [color]="s.color"
      [trend]="s.trend"
      [trendUp]="s.trendUp"
      [trendDetail]="s.trendDetail"
      [sparkline]="s.sparkline"
      [variant]="s.variant || 'default'"
      [loading]="loading"
      (click)="onStatClick(s.key)"
      class="clickable-tile">
    </stb-stat-tile>
  </section>

  <!-- Transport operations -->
  <section class="dash-section ops-strip" *ngIf="summary">
    <div class="ops-item" *ngFor="let k of transportKpis">
      <mat-icon>{{ k.icon }}</mat-icon>
      <div>
        <span class="ops-val">{{ k.value }}</span>
        <span class="ops-lbl">{{ k.label }}</span>
      </div>
    </div>
    <a class="ops-link" routerLink="/gps-tracking/live">
      <mat-icon>my_location</mat-icon>
      Live tracking
    </a>
  </section>

  <!-- Analytics -->
  <app-dashboard-analytics
    [loading]="loading"
    [revenueLabels]="revenueChartLabels"
    [revenueValues]="revenueChartValues"
    [revenueTotal]="revenueWeekTotal"
    [bookingLabels]="bookingChartLabels"
    [bookingValues]="bookingChartValues"
    [fleetLabels]="fleetChartLabels"
    [fleetValues]="fleetChartValues">
  </app-dashboard-analytics>

  <!-- To-do & assignments -->
  <section class="dash-section row-ops">
    <stb-task-list-card
      class="ops-panel c-todo"
      title="To do"
      icon="task_alt"
      [tasks]="todoTasks"
      (toggle)="onTaskToggle($event)"
      emptyMessage="No pending bookings today — you're all caught up.">
    </stb-task-list-card>

    <stb-task-list-card
      class="ops-panel c-assigned"
      title="Assignments"
      icon="assignment_ind"
      [tasks]="assignedTasks"
      [filters]="assignedFilters"
      [activeFilter]="assignedFilter"
      (filterChange)="onAssignedFilter($event)"
      (toggle)="onTaskToggle($event)"
      emptyMessage="No trips assigned for this filter.">
    </stb-task-list-card>
  </section>

  <!-- Recent bookings -->
  <section class="dash-section row-table">
    <stb-data-table-card
      class="c-recent"
      title="Recent bookings"
      icon="confirmation_number"
      actionLabel="View all"
      [showRowActions]="true"
      [columns]="recentColumns"
      [rows]="recentBookings"
      (action)="onViewAllBookings()"
      (rowClick)="onRecentBookingClick($event)"
      (viewRow)="onViewBooking($event)"
      (editRow)="onEditBooking($event)"
      (assignRow)="onAssignBooking($event)"
      emptyMessage="No recent bookings yet.">
    </stb-data-table-card>
  </section>

  <!-- Compact CTA -->
  <section class="dash-section dash-cta-bar">
    <div class="cta-text">
      <mat-icon>directions_bus</mat-icon>
      <div>
        <strong>New booking</strong>
        <span>Assign driver & vehicle in the guided wizard</span>
      </div>
    </div>
    <button mat-flat-button color="primary" type="button" (click)="onPromoCta()">
      <mat-icon>add</mat-icon>
      Create booking
    </button>
  </section>
</div>
