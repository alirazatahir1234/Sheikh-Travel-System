<section class="auth-page">
  <app-login-hero [year]="year"></app-login-hero>

  <app-login-form-card
    [form]="form"
    [loading]="loading"
    [hidePassword]="hidePassword"
    [rememberMe]="rememberMe"
    (hidePasswordChange)="hidePassword = $event"
    (rememberMeChange)="rememberMe = $event"
    (submitLogin)="submit()"
    (forgotPasswordClick)="forgotPassword()"
    (socialLoginClick)="socialLogin($event)"
  >
  </app-login-form-card>
</section>
