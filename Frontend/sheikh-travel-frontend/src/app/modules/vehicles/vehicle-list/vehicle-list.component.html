<div class="page-header">
  <h2>Vehicles</h2>
  <button mat-raised-button color="primary" routerLink="/vehicles/new">
    <mat-icon>add</mat-icon> Add Vehicle
  </button>
</div>

<mat-card>
  <mat-card-content>
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search vehicles...</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput (keyup)="applyFilter($event)">
    </mat-form-field>

    <div *ngIf="loading" class="loading"><mat-spinner diameter="36"></mat-spinner></div>
    <div *ngIf="error" class="error-message"><mat-icon>error</mat-icon> {{ error }}</div>

    <table mat-table [dataSource]="dataSource" *ngIf="!loading && !error" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let v">{{ v.name }}</td>
      </ng-container>
      <ng-container matColumnDef="registrationNumber">
        <th mat-header-cell *matHeaderCellDef>Registration</th>
        <td mat-cell *matCellDef="let v">{{ v.registrationNumber }}</td>
      </ng-container>
      <ng-container matColumnDef="seatingCapacity">
        <th mat-header-cell *matHeaderCellDef>Seats</th>
        <td mat-cell *matCellDef="let v">{{ v.seatingCapacity }}</td>
      </ng-container>
      <ng-container matColumnDef="fuelAverage">
        <th mat-header-cell *matHeaderCellDef>Fuel Avg (km/L)</th>
        <td mat-cell *matCellDef="let v">{{ v.fuelAverage }}</td>
      </ng-container>
      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let v">
          <mat-chip [class]="v.isActive ? 'chip-active' : 'chip-inactive'">
            {{ v.isActive ? 'Active' : 'Inactive' }}
          </mat-chip>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let v">
          <button mat-icon-button color="primary" (click)="edit(v.id)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="toggleStatus(v.id)" matTooltip="Toggle Status">
            <mat-icon>{{ v.isActive ? 'toggle_on' : 'toggle_off' }}</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(v.id)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="totalCount" [pageSizeOptions]="[10,25,50]"
      (page)="load($event.pageIndex + 1, $event.pageSize)">
    </mat-paginator>
  </mat-card-content>
</mat-card>
