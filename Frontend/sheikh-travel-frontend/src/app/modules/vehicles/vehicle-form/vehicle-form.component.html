<div class="page-header">
  <h2>{{ isEdit ? 'Edit Vehicle' : 'Add Vehicle' }}</h2>
  <button mat-button routerLink="/vehicles"><mat-icon>arrow_back</mat-icon> Back</button>
</div>

<mat-card class="form-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Vehicle Name</mat-label>
          <input matInput formControlName="name" placeholder="Toyota Coaster">
          <mat-error *ngIf="form.get('name')?.hasError('required')">Required</mat-error>
          <mat-error *ngIf="form.get('name')?.hasError('maxlength')">Max 100 characters</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Registration Number</mat-label>
          <input matInput formControlName="registrationNumber" placeholder="KHI-1234">
          <mat-error *ngIf="form.get('registrationNumber')?.hasError('required')">Required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Seating Capacity</mat-label>
          <input matInput type="number" formControlName="seatingCapacity" min="1">
          <mat-error *ngIf="form.get('seatingCapacity')?.hasError('required')">Required</mat-error>
          <mat-error *ngIf="form.get('seatingCapacity')?.hasError('min')">Must be at least 1</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Fuel Average (km/L)</mat-label>
          <input matInput type="number" formControlName="fuelAverage" min="0.1" step="0.1">
          <mat-error *ngIf="form.get('fuelAverage')?.hasError('required')">Required</mat-error>
          <mat-error *ngIf="form.get('fuelAverage')?.hasError('min')">Must be greater than 0</mat-error>
        </mat-form-field>
      </div>

      <div class="actions">
        <button mat-button type="button" routerLink="/vehicles">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          {{ isEdit ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
