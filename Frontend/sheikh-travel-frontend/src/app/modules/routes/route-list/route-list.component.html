<div class="page-header">
  <h2>Routes</h2>
  <button mat-raised-button color="primary" routerLink="/routes/new">
    <mat-icon>add</mat-icon> Add Route
  </button>
</div>

<mat-card>
  <mat-card-content>
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search routes...</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput (keyup)="applyFilter($event)">
    </mat-form-field>

    <div *ngIf="loading" class="loading"><mat-spinner diameter="36"></mat-spinner></div>
    <div *ngIf="error" class="error-message"><mat-icon>error</mat-icon> {{ error }}</div>

    <table mat-table [dataSource]="dataSource" *ngIf="!loading && !error" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Route Name</th>
        <td mat-cell *matCellDef="let r">{{ r.name }}</td>
      </ng-container>
      <ng-container matColumnDef="origin">
        <th mat-header-cell *matHeaderCellDef>From</th>
        <td mat-cell *matCellDef="let r">{{ r.origin }}</td>
      </ng-container>
      <ng-container matColumnDef="destination">
        <th mat-header-cell *matHeaderCellDef>To</th>
        <td mat-cell *matCellDef="let r">{{ r.destination }}</td>
      </ng-container>
      <ng-container matColumnDef="distanceKm">
        <th mat-header-cell *matHeaderCellDef>Distance (km)</th>
        <td mat-cell *matCellDef="let r">{{ r.distanceKm }}</td>
      </ng-container>
      <ng-container matColumnDef="estimatedMinutes">
        <th mat-header-cell *matHeaderCellDef>Duration (min)</th>
        <td mat-cell *matCellDef="let r">{{ r.estimatedMinutes }}</td>
      </ng-container>
      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let r">
          <mat-chip [class]="r.isActive ? 'chip-active' : 'chip-inactive'">
            {{ r.isActive ? 'Active' : 'Inactive' }}
          </mat-chip>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let r">
          <button mat-icon-button color="primary" (click)="edit(r.id)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="delete(r.id)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="totalCount" [pageSizeOptions]="[10,25,50]"
      (page)="load($event.pageIndex + 1, $event.pageSize)">
    </mat-paginator>
  </mat-card-content>
</mat-card>
