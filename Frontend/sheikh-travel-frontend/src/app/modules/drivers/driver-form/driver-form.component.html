<div class="page-header">
  <h2>{{ isEdit ? 'Edit Driver' : 'Add Driver' }}</h2>
  <button mat-button routerLink="/drivers"><mat-icon>arrow_back</mat-icon> Back</button>
</div>

<mat-card class="form-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="fullName">
          <mat-error *ngIf="form.get('fullName')?.hasError('required')">Required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone</mat-label>
          <input matInput formControlName="phone" placeholder="+92-300-1234567">
          <mat-error *ngIf="form.get('phone')?.hasError('required')">Required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>License Number</mat-label>
          <input matInput formControlName="licenseNumber">
          <mat-error *ngIf="form.get('licenseNumber')?.hasError('required')">Required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>License Expiry Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="licenseExpiryDate">
          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
          <mat-error *ngIf="form.get('licenseExpiryDate')?.hasError('required')">Required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>CNIC (optional)</mat-label>
          <input matInput formControlName="cnic" placeholder="XXXXX-XXXXXXX-X">
        </mat-form-field>

        <mat-form-field appearance="outline" class="span-2">
          <mat-label>Address (optional)</mat-label>
          <textarea matInput formControlName="address" rows="2"></textarea>
        </mat-form-field>
      </div>

      <div class="actions">
        <button mat-button type="button" routerLink="/drivers">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          {{ isEdit ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
