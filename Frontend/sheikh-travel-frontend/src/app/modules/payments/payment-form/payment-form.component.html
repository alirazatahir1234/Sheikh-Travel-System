<div class="page-header">
  <h2>Record Payment</h2>
  <button mat-button routerLink="/payments"><mat-icon>arrow_back</mat-icon> Back</button>
</div>

<mat-card class="form-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Booking ID</mat-label>
          <input matInput type="number" formControlName="bookingId">
          <mat-error>Required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Amount (PKR)</mat-label>
          <input matInput type="number" formControlName="amount" min="1">
          <mat-error>Required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Payment Method</mat-label>
          <mat-select formControlName="paymentMethod">
            <mat-option *ngFor="let m of methods" [value]="m">{{ m }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Reference Number (optional)</mat-label>
          <input matInput formControlName="referenceNumber">
        </mat-form-field>
      </div>

      <div class="actions">
        <button mat-button type="button" routerLink="/payments">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="loading">
          <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
          Record Payment
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
