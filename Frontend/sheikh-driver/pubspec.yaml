name: sheikh_go_driver
description: SheikhGo Driver — Production driver app for SheikhGo fleet platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.0

  # Secure storage & local cache
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.0.0

  # Location & GPS
  geolocator: ^11.0.0
  permission_handler: ^11.3.1

  # Background tasks
  workmanager: ^0.9.0

  # Real-time (SignalR)
  signalr_netcore: ^1.3.4

  # Firebase
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  firebase_crashlytics: ^4.0.0

  # Maps
  google_maps_flutter: ^2.6.1

  # UI helpers
  cached_network_image: ^3.3.1
  image_picker: ^1.1.0
  flutter_native_splash: ^2.4.0
  intl: ^0.19.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
