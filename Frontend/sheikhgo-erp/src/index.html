<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SheikhGo ERP</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0E3D3A">
  <link rel="icon" type="image/png" href="brand/sheikhgo-logo.png">
  <link rel="apple-touch-icon" href="brand/sheikhgo-logo.png">

  <!-- Inter (used as the app's primary typeface) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Plus Jakarta Sans + Manrope (Fleet management UI typefaces) -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Material Icons (required by every <mat-icon>) -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    #app-initial-splash {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f8fffe 0%, #eef8f6 100%);
    }

    #app-initial-splash svg {
      width: 112px;
      height: 112px;
    }

    #app-initial-splash .boot-arc {
      transform-origin: 60px 60px;
      animation: boot-arc-spin 1.15s linear infinite;
    }

    @keyframes boot-arc-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app-initial-splash" aria-hidden="true">
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="60" cy="60" r="46" fill="none" stroke="#0FAF9F" stroke-width="7" stroke-opacity="0.18" />
      <g class="boot-arc">
        <circle cx="60" cy="60" r="46" fill="none" stroke="#0FAF9F" stroke-width="7" stroke-linecap="round" pathLength="100" stroke-dasharray="28 72" />
      </g>
      <circle cx="60" cy="60" r="30" fill="#0E3D3A" />
      <text x="60" y="67" text-anchor="middle" fill="#fff" font-family="Georgia, serif" font-size="24" font-weight="700">SG</text>
    </svg>
  </div>
  <app-root></app-root>
</body>
</html>
