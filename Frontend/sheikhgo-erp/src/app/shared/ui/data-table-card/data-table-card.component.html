<stb-info-card [title]="title" [icon]="icon" class="stb-dt-card-host">
  <ng-container actions>
    <button mat-button color="primary" class="stb-dt-header-action" (click)="action.emit()">
      <mat-icon>open_in_new</mat-icon>
      <span>{{ actionLabel }}</span>
    </button>
  </ng-container>

  <div class="stb-dt stb-dt--desktop" *ngIf="rows?.length; else empty">
    <table>
      <thead>
        <tr>
          <th *ngFor="let c of columns"
              [style.width]="c.width"
              [style.textAlign]="c.align || 'left'">
            {{ c.header }}
          </th>
          <th *ngIf="showRowActions" class="col-actions" aria-label="Actions"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows" (click)="onRowClick(row)">
          <td *ngFor="let c of columns"
              [style.textAlign]="c.align || 'left'">
            <span *ngIf="c.badge; else plainCell"
                  class="status-badge"
                  [attr.data-status]="statusKey(row, c)">
              <mat-icon class="badge-icon">{{ statusIcon(row, c) }}</mat-icon>
              {{ valueFor(row, c) }}
            </span>
            <ng-template #plainCell>{{ valueFor(row, c) }}</ng-template>
          </td>
          <td *ngIf="showRowActions" class="col-actions" (click)="$event.stopPropagation()">
            <button mat-icon-button type="button"
                    class="stb-dt-row-menu"
                    [matMenuTriggerFor]="actionsMenu"
                    (click)="selectRow(row, $event)"
                    aria-label="Row actions">
              <mat-icon>more_vert</mat-icon>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="stb-dt-cards" *ngIf="rows?.length">
    <article class="stb-dt-mobile-card"
             *ngFor="let row of rows"
             (click)="onRowClick(row)">
      <div class="stb-dt-mobile-card__head">
        <div class="stb-dt-mobile-card__title-wrap">
          <h4 class="stb-dt-mobile-card__title">{{ valueFor(row, columns[0]) }}</h4>
        </div>
        <ng-container *ngFor="let c of columns">
          <span *ngIf="c.badge"
                class="status-badge"
                [attr.data-status]="statusKey(row, c)">
            <mat-icon class="badge-icon">{{ statusIcon(row, c) }}</mat-icon>
            {{ valueFor(row, c) }}
          </span>
        </ng-container>
      </div>

      <dl class="stb-dt-mobile-card__meta">
        <ng-container *ngFor="let c of columns; let i = index">
          <div class="stb-dt-mobile-card__field" *ngIf="i > 0 && !c.badge">
            <dt>{{ c.header }}</dt>
            <dd [class.stb-dt-mobile-card__amount]="c.align === 'right'">{{ valueFor(row, c) }}</dd>
          </div>
        </ng-container>
      </dl>

      <div class="stb-dt-mobile-card__actions" *ngIf="showRowActions" (click)="$event.stopPropagation()">
        <button type="button" class="stb-dt-mobile-action" (click)="viewRow.emit(row)">
          <mat-icon>visibility</mat-icon>
          <span>View</span>
        </button>
        <button type="button" class="stb-dt-mobile-action" (click)="editRow.emit(row)">
          <mat-icon>edit</mat-icon>
          <span>Edit</span>
        </button>
        <button type="button" class="stb-dt-mobile-action stb-dt-mobile-action--primary" (click)="assignRow.emit(row)">
          <mat-icon>person_add</mat-icon>
          <span>Assign</span>
        </button>
      </div>
    </article>
  </div>

  <mat-menu #actionsMenu="matMenu" xPosition="before">
    <button mat-menu-item (click)="viewRow.emit(selectedRow!)">
      <mat-icon>visibility</mat-icon><span>View</span>
    </button>
    <button mat-menu-item (click)="editRow.emit(selectedRow!)">
      <mat-icon>edit</mat-icon><span>Edit</span>
    </button>
    <button mat-menu-item (click)="assignRow.emit(selectedRow!)">
      <mat-icon>person_add</mat-icon><span>Assign driver</span>
    </button>
  </mat-menu>

  <ng-template #empty>
    <div class="stb-empty">
      <mat-icon>folder_open</mat-icon>
      <span>{{ emptyMessage }}</span>
    </div>
  </ng-template>
</stb-info-card>
