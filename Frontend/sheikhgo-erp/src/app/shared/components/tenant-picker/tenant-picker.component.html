<div class="tenant-picker">
  <div class="stb-field tenant-picker-field">
    <label for="tenant-picker-select">Select Tenant</label>
    <select
      id="tenant-picker-select"
      class="stb-select"
      [ngModel]="selectedTenantId"
      (ngModelChange)="selectTenant($event)"
      [disabled]="loading"
    >
      <option *ngFor="let tenant of tenants" [ngValue]="tenant.id">
        {{ tenant.name }} ({{ tenant.slug || tenant.code }})
      </option>
    </select>
  </div>
</div>
