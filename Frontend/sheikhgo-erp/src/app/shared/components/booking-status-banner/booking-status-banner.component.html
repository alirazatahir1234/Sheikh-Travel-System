<div class="stb-banner" [ngClass]="'stb-banner--' + vm.variant" role="status">
  <mat-icon class="stb-banner-icon">{{ vm.icon }}</mat-icon>
  <div class="stb-banner-text">
    <div class="stb-banner-title">{{ vm.title }}</div>
    <div class="stb-banner-subtitle">{{ vm.subtitle }}</div>
  </div>
</div>
