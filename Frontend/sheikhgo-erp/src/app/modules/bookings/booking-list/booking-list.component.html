<div class="bookings-page">
<div class="page-header">
  <h2>Bookings</h2>
  <div class="header-actions">
    <button mat-stroked-button color="warn" class="action-btn"
            [disabled]="!selectionCount || bulkDeleting"
            (click)="bulkDeleteSelected()">
      <mat-spinner *ngIf="bulkDeleting" diameter="18"></mat-spinner>
      <mat-icon *ngIf="!bulkDeleting">delete_sweep</mat-icon>
      <span class="btn-label">Delete<span class="btn-label-short"> ({{ selectionCount }})</span></span>
    </button>
    <button mat-stroked-button color="primary" class="action-btn" (click)="exportCsv()">
      <mat-icon>download</mat-icon>
      <span class="btn-label">Export</span>
    </button>
    <button mat-raised-button color="primary" class="action-btn action-btn--primary" routerLink="/bookings/new">
      <mat-icon>add</mat-icon>
      <span class="btn-label">New Booking</span>
    </button>
  </div>
</div>

<mat-card class="bookings-card">
  <mat-card-content>
    <div class="filters">
      <div class="stb-field stb-field--search">
        <label for="booking-search">Search</label>
        <input id="booking-search" class="stb-input" type="text"
               [ngModel]="searchTerm" (ngModelChange)="onSearchChange($event)"
               placeholder="Booking #, customer, route" />
      </div>

      <div class="stb-field stb-field--filter">
        <label for="booking-status-filter">Status</label>
        <select id="booking-status-filter" class="stb-select"
                [(ngModel)]="selectedStatus" (ngModelChange)="load()">
          <option *ngFor="let s of statusOptions; trackBy: trackByValue" [ngValue]="s.value">{{ s.label }}</option>
        </select>
      </div>

      <div class="stb-field stb-field--filter">
        <label for="booking-date-from">Date From</label>
        <input id="booking-date-from" class="stb-input" type="date"
               [ngModel]="toDateInput(dateFrom)" [max]="toDateInput(dateTo) || null"
               (ngModelChange)="onDateFromChange($event)" />
      </div>

      <div class="stb-field stb-field--filter">
        <label for="booking-date-to">Date To</label>
        <input id="booking-date-to" class="stb-input" type="date"
               [ngModel]="toDateInput(dateTo)" [min]="toDateInput(dateFrom) || null"
               (ngModelChange)="onDateToChange($event)" />
      </div>

      <div class="stb-field stb-field--filter stb-field--filter-narrow">
        <label for="booking-amount-min">Min Amount</label>
        <input id="booking-amount-min" class="stb-input" type="number"
               [(ngModel)]="amountMin" (change)="applyFilters(true)" />
      </div>

      <div class="stb-field stb-field--filter stb-field--filter-narrow">
        <label for="booking-amount-max">Max Amount</label>
        <input id="booking-amount-max" class="stb-input" type="number"
               [(ngModel)]="amountMax" (change)="applyFilters(true)" />
      </div>

      <button mat-stroked-button color="warn" class="clear-filters-btn" (click)="clearFilters()">Clear</button>
    </div>

    <div class="smart-filters">
      <button mat-stroked-button (click)="applySmartFilter('today')">Today</button>
      <button mat-stroked-button (click)="applySmartFilter('pending')">Pending</button>
      <button mat-stroked-button (click)="applySmartFilter('highValue')">High Value (10k+)</button>
    </div>

    <div *ngIf="loading" class="loading"><mat-spinner diameter="36"></mat-spinner></div>
    <div *ngIf="error" class="error-message"><mat-icon>error</mat-icon> {{ error }}</div>

    <div class="table-wrap" *ngIf="!loading && !error">
    <table mat-table [dataSource]="dataSource" class="full-width responsive-table">
      <ng-container matColumnDef="select">
        <th mat-header-cell *matHeaderCellDef class="select-col">
          <mat-checkbox
            [checked]="allPageSelected()"
            [indeterminate]="somePageSelected()"
            [disabled]="!dataSource.data.length"
            (change)="toggleSelectAllOnPage($event)"
            aria-label="Select all bookings on this page">
          </mat-checkbox>
        </th>
        <td mat-cell *matCellDef="let b" class="select-col mobile-card-header" [attr.data-label]="'Select'">
          <mat-checkbox
            [checked]="isSelected(b.id)"
            (change)="toggleRowSelection(b.id, $event.checked)"
            [attr.aria-label]="'Select booking ' + b.bookingNumber">
          </mat-checkbox>
          <span class="mobile-booking-id">{{ b.bookingNumber }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="bookingNumber">
        <th mat-header-cell *matHeaderCellDef>Booking #</th>
        <td mat-cell *matCellDef="let b" [attr.data-label]="'Booking #'"><strong>{{ b.bookingNumber }}</strong></td>
      </ng-container>
      <ng-container matColumnDef="customerName">
        <th mat-header-cell *matHeaderCellDef>Customer</th>
        <td mat-cell *matCellDef="let b" [attr.data-label]="'Customer'">{{ b.customerName }}</td>
      </ng-container>
      <ng-container matColumnDef="routeName">
        <th mat-header-cell *matHeaderCellDef>Route</th>
        <td mat-cell *matCellDef="let b" [attr.data-label]="'Route'">{{ b.routeName }}</td>
      </ng-container>
      <ng-container matColumnDef="pickupTime">
        <th mat-header-cell *matHeaderCellDef>Pickup</th>
        <td mat-cell *matCellDef="let b" [attr.data-label]="'Pickup'">{{ b.pickupTime | date:'short' }}</td>
      </ng-container>
      <ng-container matColumnDef="passengerCount">
        <th mat-header-cell *matHeaderCellDef>Passengers</th>
        <td mat-cell *matCellDef="let b" [attr.data-label]="'Passengers'">{{ b.passengerCount }}</td>
      </ng-container>
      <ng-container matColumnDef="totalAmount">
        <th mat-header-cell *matHeaderCellDef>Amount</th>
        <td mat-cell *matCellDef="let b" [attr.data-label]="'Amount'">PKR {{ b.totalAmount | number }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let b" [attr.data-label]="'Status'">
          <span class="status-badge" [style.background]="getStatusColor(b.status) + '20'"
            [style.color]="getStatusColor(b.status)">{{ b.status }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let b" class="actions-cell" [attr.data-label]="'Actions'">
          <button mat-icon-button color="primary" (click)="view(b.id)" matTooltip="View">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="accent" (click)="edit(b.id)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(b.id)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns; trackBy: trackById"></tr>
    </table>
    </div>

    <div class="paginator-wrap">
      <mat-paginator [length]="totalCount" [pageIndex]="pageIndex" [pageSize]="pageSize" [pageSizeOptions]="[10, 25, 50]"
        [showFirstLastButtons]="true" (page)="onPageChange($event)">
      </mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
</div>
