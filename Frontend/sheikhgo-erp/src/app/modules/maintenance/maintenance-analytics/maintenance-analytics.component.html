<section class="maint-analytics" [class.is-loading]="loading">
  <div class="chart-card">
    <div class="chart-head">
      <h3>Maintenance cost trend</h3>
      <span class="chart-meta" *ngIf="!loading">PKR {{ costTotal | number:'1.0-0' }} (6 mo)</span>
    </div>
    <div class="chart-body">
      <canvas #costCanvas height="160"></canvas>
      <div class="chart-skeleton" *ngIf="loading"><mat-spinner diameter="28"></mat-spinner></div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-head">
      <h3>Work order status</h3>
      <span class="chart-meta" *ngIf="!loading">{{ completionRate }}% completed</span>
    </div>
    <div class="chart-body chart-body--donut">
      <canvas #statusCanvas height="180"></canvas>
      <div class="chart-skeleton" *ngIf="loading"><mat-spinner diameter="28"></mat-spinner></div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-head">
      <h3>Top vehicles by service</h3>
      <span class="chart-meta">Breakdown frequency</span>
    </div>
    <div class="chart-body">
      <canvas #vehicleCanvas height="160"></canvas>
      <div class="chart-skeleton" *ngIf="loading"><mat-spinner diameter="28"></mat-spinner></div>
    </div>
  </div>
</section>
