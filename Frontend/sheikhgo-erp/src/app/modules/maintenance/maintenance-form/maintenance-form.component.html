<div class="page-header">
  <h2>{{ pageTitle }}</h2>
  <button mat-button routerLink="/maintenance">
    <mat-icon>arrow_back</mat-icon> Back
  </button>
</div>

<div *ngIf="loading" class="loading"><mat-spinner diameter="32"></mat-spinner></div>

<mat-card *ngIf="!loading" class="form-card">
  <form [formGroup]="form" (ngSubmit)="submit()">

    <div class="form-grid">
      <div class="stb-field">
        <label for="maint-vehicle">Vehicle</label>
        <select id="maint-vehicle" class="stb-select" formControlName="vehicleId">
          <option *ngFor="let v of vehicles" [ngValue]="v.id">
            {{ v.name }} ({{ v.registrationNumber }})
          </option>
        </select>
        <span class="stb-error" *ngIf="form.get('vehicleId')?.hasError('required') && form.get('vehicleId')?.touched">Required</span>
      </div>

      <div class="stb-field">
        <label for="maint-cost">Estimated Cost (PKR)</label>
        <input id="maint-cost" class="stb-input" type="number" formControlName="cost" min="0" />
        <span class="stb-error" *ngIf="form.get('cost')?.hasError('required') && form.get('cost')?.touched">Required</span>
        <span class="stb-error" *ngIf="form.get('cost')?.hasError('min') && form.get('cost')?.touched">Cannot be negative</span>
      </div>

      <div class="stb-field">
        <label for="maint-date">Scheduled Date</label>
        <input id="maint-date" class="stb-input" type="date" formControlName="maintenanceDate" />
        <span class="stb-error" *ngIf="form.get('maintenanceDate')?.hasError('required') && form.get('maintenanceDate')?.touched">Required</span>
      </div>

      <div class="stb-field">
        <label for="maint-next-date">Next Due Date (optional)</label>
        <input id="maint-next-date" class="stb-input" type="date" formControlName="nextDueDate" />
        <span class="stb-hint">For recurring maintenance</span>
      </div>

      <div class="stb-field">
        <label for="maint-provider">Service Provider (optional)</label>
        <input id="maint-provider" class="stb-input" type="text" formControlName="serviceProvider" placeholder="e.g. Toyota Authorized" />
      </div>

      <mat-form-field appearance="outline" class="span-2">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description" rows="3"
                  placeholder="e.g. Oil change, brake pads replacement"></textarea>
        <mat-error *ngIf="form.get('description')?.hasError('required')">Required</mat-error>
      </mat-form-field>
    </div>

    <div class="actions">
      <button mat-button type="button" routerLink="/maintenance">Cancel</button>
      <button mat-raised-button color="primary" type="submit"
              [disabled]="submitting || form.invalid">
        <mat-spinner *ngIf="submitting" diameter="16"></mat-spinner>
        {{ editMode ? 'Update' : 'Schedule' }} Maintenance
      </button>
    </div>
  </form>
</mat-card>
