<div class="maint-shell">
  <header class="maint-header">
    <div class="maint-header__left">
      <h1>Fleet Maintenance</h1>
      <p>Operational oversight for {{ companyName }}'s active fleet</p>
    </div>
    <div class="maint-header__actions">
      <div class="search-wrap">
        <mat-icon>search</mat-icon>
        <input type="search" placeholder="Search vehicle, WO #, driver, workshop…"
          [ngModel]="searchQuery" (ngModelChange)="onSearchChange($event)" />
        @if (showSearchResults()) {
          <div class="search-dropdown">
            @for (r of searchResults(); track r.id + r.entityType) {
              <button type="button" class="search-item" (click)="navigateResult(r)">
                <span class="search-item__type">{{ r.entityType }}</span>
                <strong>{{ r.title }}</strong>
                <small>{{ r.subtitle }}</small>
              </button>
            }
          </div>
        }
      </div>
      <select class="period-select" [ngModel]="period()" (ngModelChange)="onPeriodChange($event)">
        <option value="Today">Today</option>
        <option value="Week">Week</option>
        <option value="Month">Month</option>
        <option value="Quarter">Quarter</option>
        <option value="Year">Year</option>
      </select>
      <button type="button" class="export-btn" (click)="exportReport()">
        <mat-icon>download</mat-icon> Export Report
      </button>
    </div>
  </header>

  <nav class="maint-subnav">
    @for (item of subNav; track item.id) {
      <a [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: !!item.exact }">
        {{ item.label }}
      </a>
    }
  </nav>

  <main class="maint-content">
    <router-outlet />
  </main>
</div>
