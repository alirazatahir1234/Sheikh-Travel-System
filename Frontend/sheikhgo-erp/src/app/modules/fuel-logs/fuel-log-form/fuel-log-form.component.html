<div class="page-header">
  <h2>{{ pageTitle }}</h2>
  <button mat-button routerLink="/fuel-logs">
    <mat-icon>arrow_back</mat-icon> Back
  </button>
</div>

<app-brand-loader *ngIf="loading" />

<mat-card *ngIf="!loading" class="form-card">
  <form [formGroup]="form" (ngSubmit)="submit()">

    <div class="form-grid">
      <div class="stb-field">
        <label for="fuel-vehicle">Vehicle</label>
        <select id="fuel-vehicle" class="stb-select" formControlName="vehicleId">
          <option *ngFor="let v of vehicles" [ngValue]="v.id">
            {{ v.name }} ({{ v.registrationNumber }})
          </option>
        </select>
        <span class="stb-error" *ngIf="form.get('vehicleId')?.hasError('required') && form.get('vehicleId')?.touched">Required</span>
      </div>

      <div class="stb-field">
        <label for="fuel-driver">Driver (optional)</label>
        <select id="fuel-driver" class="stb-select" formControlName="driverId">
          <option [ngValue]="null">— None —</option>
          <option *ngFor="let d of drivers" [ngValue]="d.id">{{ d.fullName }}</option>
        </select>
      </div>

      <div class="stb-field">
        <label for="fuel-type">Fuel Type</label>
        <select id="fuel-type" class="stb-select" formControlName="fuelType">
          <option *ngFor="let f of fuelTypes" [ngValue]="f">{{ fuelTypeLabel(f) }}</option>
        </select>
      </div>

      <div class="stb-field">
        <label for="fuel-date">Date</label>
        <input id="fuel-date" class="stb-input" type="date" formControlName="fuelDate" />
        <span class="stb-error" *ngIf="form.get('fuelDate')?.hasError('required') && form.get('fuelDate')?.touched">Required</span>
      </div>

      <div class="stb-field">
        <label for="fuel-liters">Liters</label>
        <input id="fuel-liters" class="stb-input" type="number" formControlName="liters" min="0" step="0.1" placeholder="L" />
        <span class="stb-error" *ngIf="form.get('liters')?.hasError('required') && form.get('liters')?.touched">Required</span>
        <span class="stb-error" *ngIf="form.get('liters')?.hasError('min') && form.get('liters')?.touched">Must be greater than 0</span>
      </div>

      <div class="stb-field">
        <label for="fuel-pricePerLiter">Price per Liter (PKR)</label>
        <input id="fuel-pricePerLiter" class="stb-input" type="number" formControlName="pricePerLiter" min="0" step="0.01" />
        <span class="stb-error" *ngIf="form.get('pricePerLiter')?.hasError('required') && form.get('pricePerLiter')?.touched">Required</span>
      </div>

      <div class="total-cost-display">
        <span class="label">Total Cost</span>
        <span class="value">PKR {{ totalCost | number:'1.2-2' }}</span>
      </div>

      <div class="stb-field">
        <label for="fuel-odometer">Odometer Reading (km)</label>
        <input id="fuel-odometer" class="stb-input" type="number" formControlName="odometerReading" min="0" />
        <span class="stb-hint">The odometer shows total kilometers the vehicle has traveled.</span>
        <span class="stb-error" *ngIf="form.get('odometerReading')?.hasError('required') && form.get('odometerReading')?.touched">Required</span>
      </div>

      <mat-form-field appearance="outline" class="span-2">
        <mat-label>Fuel Station (optional)</mat-label>
        <input matInput #stationInput formControlName="station"
               [placeholder]="mapsConfigured ? 'Search for fuel station...' : 'e.g. PSO DHA Phase 5'"
               autocomplete="off">
        <mat-icon matPrefix>local_gas_station</mat-icon>
        <mat-hint *ngIf="mapsConfigured">Start typing to search nearby fuel stations</mat-hint>
      </mat-form-field>
    </div>

    <div class="actions">
      <button mat-button type="button" routerLink="/fuel-logs">Cancel</button>
      <button mat-raised-button color="primary" type="submit"
              [disabled]="submitting || form.invalid">
        <mat-spinner *ngIf="submitting" diameter="16"></mat-spinner>
        {{ editMode ? 'Update' : 'Record' }} Fuel Log
      </button>
    </div>
  </form>
</mat-card>
