<section class="fuel-analytics" [class.is-loading]="loading">
  <div class="chart-card">
    <div class="chart-head">
      <h3>Fuel expense trend</h3>
      <span class="chart-meta" *ngIf="!loading">PKR {{ expenseTotal | number:'1.0-0' }} (6 mo)</span>
    </div>
    <div class="chart-body">
      <canvas #expenseCanvas height="160"></canvas>
      <div class="chart-skeleton" *ngIf="loading"><app-brand-loader size="sm" /></div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-head">
      <h3>Fuel mix</h3>
      <span class="chart-meta" *ngIf="!loading">By fuel type</span>
    </div>
    <div class="chart-body chart-body--donut">
      <canvas #typeCanvas height="200"></canvas>
      <div class="chart-skeleton" *ngIf="loading"><app-brand-loader size="sm" /></div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-head">
      <h3>Top consumers</h3>
      <span class="chart-meta" *ngIf="!loading">Fleet avg {{ fleetEfficiency | number:'1.1-1' }} km/L</span>
    </div>
    <div class="chart-body">
      <canvas #vehicleCanvas height="160"></canvas>
      <div class="chart-skeleton" *ngIf="loading"><app-brand-loader size="sm" /></div>
    </div>
  </div>
</section>
